services:
  api:
    build: .
    env_file: .env
    command: uvicorn quectosoft_hr.api:app --host 0.0.0.0 --port 8000 --workers 2
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 5
  worker:
    build: .
    env_file: .env
    command: celery -A quectosoft_hr.worker.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "print('worker-ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hr
      POSTGRES_PASSWORD: hr
      POSTGRES_DB: quectosoft_hr
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr -d quectosoft_hr"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    healthcheck:
      test: ["CMD", "sh", "-c", "echo ok"]
      interval: 30s
      timeout: 5s
      retries: 3
