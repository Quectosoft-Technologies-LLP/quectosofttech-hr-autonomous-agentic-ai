name: codeql
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with: { languages: python }
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
